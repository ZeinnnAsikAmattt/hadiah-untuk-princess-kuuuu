<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hadiah Untuk Princess Kuuu ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Tombol Pembuka Agar Musik Bisa Berputar Otomatis -->
    <div id="welcome-screen">
        <div class="welcome-box">
            <h1>Halo Sayang... ❤️</h1>
            <p>Aku punya sesuatu yang spesial buat kamu. Klik tombol di bawah ya!</p>
            <button id="start-btn">Buka Hadiah ✨</button>
        </div>
    </div>

    <!-- Element Musik -->
    <audio id="bg-music" loop>
        <source src="so-inlove-w-u-128-ytshorts.savetube.me.mp3" type="audio/mpeg">
        Browser kamu tidak mendukung pemutar musik.
    </audio>

    <!-- Kontainer Flipbook -->
    <div class="flipbook-container" id="flipbook-section" style="display: none;">
        <div id="flipbook">
            <div class="page"><img src="halaman1.jpg" alt="Halaman 1"></div>
            <div class="page"><img src="halaman2.jpg" alt="Halaman 2"></div>
            <div class="page"><img src="halaman3.jpg" alt="Halaman 3"></div>
            <div class="page"><img src="halaman4.jpg" alt="Halaman 4"></div>
        </div>
    </div>

    <!-- Library Pembalik Halaman -->
    <script src="https://jsdelivr.net"></script>
    
    <script>
        document.getElementById("start-btn").addEventListener("click", function() {
            document.getElementById("welcome-screen").style.display = "none";
            document.getElementById("flipbook-section").style.display = "flex";
            
            const musik = document.getElementById("bg-music");
            musik.play().catch(error => console.log("Musik gagal berputar otomatis:", error));

            const pageFlip = new St.PageFlip(document.getElementById("flipbook"), {
                width: 550,
                height: 733,
                size: "stretch",
                minWidth: 315,
                maxWidth: 1000,
                minHeight: 420,
                maxHeight: 1350,
                maxShadowOpacity: 0.5,
                showCover: true,
                mobileScrollSupport: true
            });
            pageFlip.loadFromHTML(document.querySelectorAll(".page"));
        });
    </script>
</body>
</html>
