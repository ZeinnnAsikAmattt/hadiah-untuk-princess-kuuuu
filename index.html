<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook Untuk Kamu ❤️</title>
    
    <!-- Library Penggerak Kertas Buku (SUDAH DIPERBAIKI) -->
    <script src="https://unpkg.com"></script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #ffeef2;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #flipbook {
            width: 400px;
            height: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            background: white;
            display: none; 
        }

        .page {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        #overlay-mulai {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 238, 242, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            text-align: center;
            padding: 20px;
        }

        .btn-mulai {
            padding: 15px 40px;
            font-size: 18px;
            background: #ff4a75;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- Tampilan Pembuka Web -->
    <div id="overlay-mulai">
        <h2 style="color: #ff4a75; margin-bottom: 5px;">Hai princess ❤️</h2>
        <p style="color: #555; font-size: 16px;">Aku punya sesuatu untuk kamu...</p>
        <button class="btn-mulai" onclick="mulaiHadiah()">❤️ Buka Hadiah ❤️</button>
    </div>

    <!-- Pemanggil Musik (Nama file tetap sama & pas) -->
    <audio id="bgMusic" src="so-inlove-w-u.mp3" loop></audio>

    <!-- 4 Halaman Gambar Kamu -->
    <div id="flipbook">
        <div class="page" style="background-image: url('halaman1.jpg');"></div>
        <div class="page" style="background-image: url('halaman2.jpg');"></div>
        <div class="page" style="background-image: url('halaman3.jpg');"></div>
        <div class="page" style="background-image: url('halaman4.jpg');"></div>
    </div>

    <script>
        function mulaiHadiah() {
            var audio = document.getElementById("bgMusic");
            audio.play().catch(function(error) {
                console.log("Musik tertahan browser:", error);
            });

            document.getElementById("overlay-mulai").style.display = "none";
            document.getElementById("flipbook").style.display = "block";

            // Inisialisasi library efek balik kertas
            const pageFlip = new St.PageFlip(document.getElementById("flipbook"), {
                width: 400,
                height: 600,
                size: "stretch",
                minWidth: 300,
                maxWidth: 1000,
                minHeight: 400,
                maxHeight: 1500,
                maxShadowOpacity: 0.5,
                showCover: true,
                mobileScrollSupport: true 
            });

            pageFlip.loadFromHTML(document.querySelectorAll(".page"));
        }
    </script>
</body>
  </html>
